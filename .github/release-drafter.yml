name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
categories:
  - title: 'New things'
    labels:
      - 'enhancement'
      - 'feature'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: 'Security'
    labels:
      - 'security'
  - title: 'Maintenance'
    labels:
      - 'cleaning'
  - title: 'Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: 'CI/CD'
    labels:
      - 'ci'
      - 'cd'
  - title: 'Frontend bumps'
    labels:
      - 'javascript'
  - title: 'Backend bumps'
    labels:
      - 'python'
      - 'python:uv'
  - title: 'CI bumps'
    labels:
      - 'github_actions'
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: minor
template: |
  $CHANGES
